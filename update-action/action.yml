name: ghagen Update
description: Detect and apply dependency updates for ghagen-managed GitHub Actions workflows
branding:
  icon: refresh-cw
  color: blue
inputs:
  mode:
    description: "Detection mode: 'versions', 'lockfile', or 'all'"
    required: false
    default: all
  output:
    description: "Output type: 'pr' or 'issue'"
    required: false
    default: pr
  config:
    description: Path to ghagen config file
    required: false
    default: .github/ghagen_workflows.py
  python-version:
    description: Python version to use
    required: false
    default: '3.13'
  ghagen-version:
    description: ghagen version to install (empty for latest)
    required: false
    default: ''
  token:
    description: GitHub token for API calls and PR/issue creation
    required: false
    default: ${{ github.token }}
  labels:
    description: Comma-separated labels to apply to PRs/issues
    required: false
    default: ''
  branch-prefix:
    description: Branch name prefix for PRs
    required: false
    default: ghagen-update/
  commit-message-prefix:
    description: Optional prefix for commit messages (e.g. "chore(deps):")
    required: false
    default: ''
  group:
    description: Group all updates into a single PR/issue
    required: false
    default: 'false'
runs:
  using: composite
  steps:
  - uses: actions/setup-python@v5
    with:
      python-version: ${{ inputs.python-version }}

  - name: Install ghagen
    run: |
      if [ -n "${{ inputs.ghagen-version }}" ]; then
        pip install "ghagen==${{ inputs.ghagen-version }}"
      else
        pip install ghagen
      fi
    shell: bash

  - name: Detect outdated dependencies
    id: detect
    env:
      GITHUB_TOKEN: ${{ inputs.token }}
    run: |
      set -euo pipefail

      OUTDATED_JSON=$(ghagen outdated --json --mode "${{ inputs.mode }}" --config "${{ inputs.config }}" 2>&1 || true)

      # Check if there are any updates
      VERSION_BUMPS=$(echo "$OUTDATED_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('version_bumps',[])))")
      LOCKFILE_STALE=$(echo "$OUTDATED_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('lockfile_stale',[])))")
      HELPER_PROVIDED=$(echo "$OUTDATED_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('helper_provided',[])))")

      echo "outdated_json<<GHAGEN_EOF" >> "$GITHUB_OUTPUT"
      echo "$OUTDATED_JSON" >> "$GITHUB_OUTPUT"
      echo "GHAGEN_EOF" >> "$GITHUB_OUTPUT"

      echo "version_bumps=$VERSION_BUMPS" >> "$GITHUB_OUTPUT"
      echo "lockfile_stale=$LOCKFILE_STALE" >> "$GITHUB_OUTPUT"
      echo "helper_provided=$HELPER_PROVIDED" >> "$GITHUB_OUTPUT"

      TOTAL=$((VERSION_BUMPS + LOCKFILE_STALE))
      echo "total_updates=$TOTAL" >> "$GITHUB_OUTPUT"

      if [ "$TOTAL" -eq 0 ]; then
        echo "No dependency updates found."
      else
        echo "Found $VERSION_BUMPS version bump(s) and $LOCKFILE_STALE stale lockfile entry/entries."
      fi
    shell: bash

  - name: Exit early if no updates
    if: steps.detect.outputs.total_updates == '0'
    run: echo "Everything is up to date."
    shell: bash

  - name: Create PR
    if: steps.detect.outputs.total_updates != '0' && inputs.output == 'pr'
    env:
      GITHUB_TOKEN: ${{ inputs.token }}
      GH_TOKEN: ${{ inputs.token }}
    run: |
      set -euo pipefail

      BRANCH="${{ inputs.branch-prefix }}$(date +%Y%m%d)"
      PREFIX="${{ inputs.commit-message-prefix }}"
      LABEL_ARGS=""
      if [ -n "${{ inputs.labels }}" ]; then
        IFS=',' read -ra LABELS <<< "${{ inputs.labels }}"
        for label in "${LABELS[@]}"; do
          LABEL_ARGS="$LABEL_ARGS --label $(echo "$label" | xargs)"
        done
      fi

      # Check if branch/PR already exists
      EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
      if [ -n "$EXISTING_PR" ]; then
        echo "PR #$EXISTING_PR already exists for branch $BRANCH. Skipping."
        exit 0
      fi

      git config user.name "github-actions[bot]"
      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      git checkout -b "$BRANCH"

      # Apply version bumps if any
      if [ "${{ steps.detect.outputs.version_bumps }}" != "0" ]; then
        ghagen outdated --apply --mode versions --config "${{ inputs.config }}"
      fi

      # Refresh lockfile
      if [ "${{ steps.detect.outputs.lockfile_stale }}" != "0" ] || [ "${{ steps.detect.outputs.version_bumps }}" != "0" ]; then
        ghagen pin --config "${{ inputs.config }}" --update
      fi

      # Check if there are actual changes
      if git diff --quiet && git diff --cached --quiet; then
        echo "No file changes after applying updates."
        exit 0
      fi

      # Build commit message
      COMMIT_MSG="${PREFIX}update ghagen action dependencies"
      if [ -n "$PREFIX" ]; then
        COMMIT_MSG="${PREFIX} update ghagen action dependencies"
      fi

      git add -A
      git commit -m "$COMMIT_MSG"
      git push -u origin "$BRANCH"

      # Build PR body
      PR_BODY=$(cat <<'BODY_EOF'
      ## ghagen dependency update

      BODY_EOF
      )

      # Add version bump details
      if [ "${{ steps.detect.outputs.version_bumps }}" != "0" ]; then
        BUMP_DETAILS=$(echo '${{ steps.detect.outputs.outdated_json }}' | python3 -c "
      import sys, json
      d = json.load(sys.stdin)
      for b in d.get('version_bumps', []):
          print(f\"- \`{b['uses']}\` → \`{b['latest']}\` [{b['severity']}]\")
      ")
        PR_BODY="$PR_BODY

      ### Version bumps
      $BUMP_DETAILS"
      fi

      # Add lockfile stale details
      if [ "${{ steps.detect.outputs.lockfile_stale }}" != "0" ]; then
        STALE_DETAILS=$(echo '${{ steps.detect.outputs.outdated_json }}' | python3 -c "
      import sys, json
      d = json.load(sys.stdin)
      for s in d.get('lockfile_stale', []):
          print(f\"- \`{s['uses']}\` SHA refreshed\")
      ")
        PR_BODY="$PR_BODY

      ### Lockfile maintenance
      $STALE_DETAILS"
      fi

      # Add helper-provided info
      if [ "${{ steps.detect.outputs.helper_provided }}" != "0" ]; then
        HELPER_DETAILS=$(echo '${{ steps.detect.outputs.outdated_json }}' | python3 -c "
      import sys, json
      d = json.load(sys.stdin)
      for h in d.get('helper_provided', []):
          print(f\"- \`{h['uses']}\` → \`{h['latest']}\` (upgrade ghagen to get this)\")
      ")
        PR_BODY="$PR_BODY

      ### Helper-provided actions (requires ghagen upgrade)
      $HELPER_DETAILS"
      fi

      eval gh pr create --title "\"${COMMIT_MSG}\"" --body "\"${PR_BODY}\"" $LABEL_ARGS
    shell: bash

  - name: Create issue
    if: steps.detect.outputs.total_updates != '0' && inputs.output == 'issue'
    env:
      GH_TOKEN: ${{ inputs.token }}
    run: |
      set -euo pipefail

      TITLE="ghagen dependency updates available ($(date +%Y-%m-%d))"
      LABEL_ARGS=""
      if [ -n "${{ inputs.labels }}" ]; then
        IFS=',' read -ra LABELS <<< "${{ inputs.labels }}"
        for label in "${LABELS[@]}"; do
          LABEL_ARGS="$LABEL_ARGS --label $(echo "$label" | xargs)"
        done
      fi

      # Check if issue already exists
      EXISTING=$(gh issue list --search "\"$TITLE\" in:title" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
      if [ -n "$EXISTING" ]; then
        echo "Issue #$EXISTING already exists. Skipping."
        exit 0
      fi

      BODY=$(echo '${{ steps.detect.outputs.outdated_json }}' | python3 -c "
      import sys, json
      d = json.load(sys.stdin)
      parts = []

      bumps = d.get('version_bumps', [])
      if bumps:
          parts.append('## Version updates available\n')
          for b in bumps:
              files = ', '.join(f'\`{f}\`' for f in b.get('source_files', []))
              parts.append(f\"- [ ] \`{b['uses']}\` → \`{b['latest']}\` [{b['severity']}]  \")
              if files:
                  parts.append(f\"  in {files}\")

      stale = d.get('lockfile_stale', [])
      if stale:
          parts.append('\n## Stale lockfile entries\n')
          parts.append('Run \`ghagen pin --update\` to refresh.\n')
          for s in stale:
              parts.append(f\"- [ ] \`{s['uses']}\` — SHA changed\")

      helpers = d.get('helper_provided', [])
      if helpers:
          parts.append('\n## Helper-provided actions (requires ghagen upgrade)\n')
          for h in helpers:
              parts.append(f\"- \`{h['uses']}\` → \`{h['latest']}\` [{h['severity']}]\")

      print('\n'.join(parts))
      ")

      eval gh issue create --title "\"$TITLE\"" --body "\"$BODY\"" $LABEL_ARGS
    shell: bash
