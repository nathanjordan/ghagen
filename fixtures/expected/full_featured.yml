name: Full Featured
on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main
    tags:
    - v*
  schedule:
  - cron: 0 0 * * 0
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        type: string
permissions:
  contents: read
  pull-requests: write
env:
  CI: 'true'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 1
    - name: Ruff
      run: ruff check .
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version:
        - '3.11'
        - '3.12'
        - '3.13'
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 1
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Test
      run: python -m pytest
  container-test:
    name: Container Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 1
    - name: Test with DB
      run: python -m pytest --db
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
        ports:
        - 5432
    container:
      image: python:3.13
  deploy:
    needs:
    - test
    - container-test
    uses: octo-org/deploy/.github/workflows/deploy.yml@main
    with:
      environment: production
    secrets: inherit
