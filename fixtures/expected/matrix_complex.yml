name: Matrix CI
on:
  push:
    branches:
    - main
jobs:
  test:
    name: Test (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        exclude:
        - os: windows-latest
          python-version: '3.11'
        python-version:
        - '3.11'
        - '3.12'
        - '3.13'
        os:
        - ubuntu-latest
        - macos-latest
        - windows-latest
      fail-fast: false
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 1
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install deps
      run: pip install -e '.[test]'
    - name: Test
      run: python -m pytest
