name: CI
on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main
permissions:
  contents: read
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up uv
      uses: astral-sh/setup-uv@v7
    - name: Sync
      run: uv sync
    - name: Ruff check
      run: uv run ruff check packages/python/src/ packages/python/tests/
    - name: Ruff format check
      run: uv run ruff format --check packages/python/src/ packages/python/tests/
    - name: actionlint
      uses: rhysd/actionlint@v1.7.12
    - name: ghagen deps check-synced
      run: uv run ghagen deps check-synced
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 10
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up uv
      uses: astral-sh/setup-uv@v7
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
    - name: Sync
      run: uv sync
    - name: Install TS deps
      run: npm ci
      working-directory: packages/typescript
    - name: Pyright
      run: uv run pyright packages/python/src/
    - name: tsc
      run: npm run typecheck
      working-directory: packages/typescript
    timeout-minutes: 10
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
        - '3.11'
        - '3.12'
        - '3.13'
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up uv
      uses: astral-sh/setup-uv@v7
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Sync
      run: uv sync
    - name: Test
      run: uv run pytest
    timeout-minutes: 15
  check-sync:
    name: Check workflow sync
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up uv
      uses: astral-sh/setup-uv@v7
    - name: Sync
      run: uv sync
    - name: Verify workflows
      run: uv run ghagen check-synced
    timeout-minutes: 10
  ts-lint:
    name: TypeScript lint & format
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
    - name: Install TS deps
      run: npm ci
      working-directory: packages/typescript
    - name: Install docs deps
      run: npm ci
      working-directory: docs
    - name: oxlint (typescript)
      run: npm run lint
      working-directory: packages/typescript
    - name: oxlint (docs)
      run: npm run lint
      working-directory: docs
    - name: oxfmt check (typescript)
      run: npm run fmt:check
      working-directory: packages/typescript
    - name: oxfmt check (docs)
      run: npm run fmt:check
      working-directory: docs
    timeout-minutes: 10
  test-action:
    name: Test action
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Test composite action
      uses: ./check-synth
      with:
        source: .
    timeout-minutes: 10
