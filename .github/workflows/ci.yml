# This file is generated by ghagen from .github/ghagen_workflows.py.
# Do not edit manually.
name: CI
on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main
permissions:
  contents: read
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
    - name: Set up uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
    - name: Sync
      run: uv sync
    - name: Ruff check
      run: uv run ruff check packages/python/src/ packages/python/tests/
    - name: actionlint
      uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca  # v1.7.12
    - name: ghagen lint
      run: uv run ghagen lint --format=github
    - name: ghagen deps check-synced
      run: uv run ghagen deps check-synced --prune
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 10
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
    - name: Set up uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
    - name: Sync
      run: uv sync
    - name: Pyright
      run: uv run pyright packages/python/src/
    timeout-minutes: 10
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
        - '3.11'
        - '3.12'
        - '3.13'
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
    - name: Set up uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Sync
      run: uv sync
    - name: Test
      run: uv run pytest
    timeout-minutes: 15
  check-sync:
    name: Check workflow sync
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
    - name: Set up uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
    - name: Sync
      run: uv sync
    - name: Verify workflows
      run: uv run ghagen check-synced
    timeout-minutes: 10
  ts-lint:
    name: TypeScript lint & format
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
      with:
        node-version: '24'
    - name: Install TS deps
      run: npm ci
      working-directory: packages/typescript
    - name: Install docs deps
      run: npm ci
      working-directory: docs
    - name: oxlint (typescript)
      run: npm run lint
      working-directory: packages/typescript
    - name: oxlint (docs)
      run: npm run lint
      working-directory: docs
    - name: oxfmt check (typescript)
      run: npm run fmt:check
      working-directory: packages/typescript
    - name: oxfmt check (docs)
      run: npm run fmt:check
      working-directory: docs
    timeout-minutes: 10
  test-action:
    name: Test action
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
    - name: Test composite action
      uses: ./
      with:
        source: .
    timeout-minutes: 10
