# This file is generated by ghagen from .github/ghagen_workflows.py.
# Do not edit manually.
name: CI
on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main
permissions:
  contents: read
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      with:
        fetch-depth: 1
    - name: Set up uv
      uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
    - name: Sync
      run: uv sync
    - name: Ruff check
      run: uv run ruff check packages/python/src/ packages/python/tests/
    - name: actionlint
      uses: rhysd/actionlint@393031adb9afb225ee52ae2ccd7a5af5525e03e8  # v1.7.11
    - name: ghagen lint
      run: uv run ghagen lint --format=github
    - name: ghagen deps check-synced
      run: uv run ghagen deps check-synced --prune
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 10
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      with:
        fetch-depth: 1
    - name: Set up uv
      uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
    - name: Sync
      run: uv sync
    - name: Pyright
      run: uv run pyright packages/python/src/
    timeout-minutes: 10
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
        - '3.11'
        - '3.12'
        - '3.13'
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      with:
        fetch-depth: 1
    - name: Set up uv
      uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Sync
      run: uv sync
    - name: Test
      run: uv run pytest
    timeout-minutes: 15
  check-sync:
    name: Check workflow sync
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      with:
        fetch-depth: 1
    - name: Set up uv
      uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
    - name: Sync
      run: uv sync
    - name: Verify workflows
      run: uv run ghagen check-synced
    timeout-minutes: 10
  test-action:
    name: Test action
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      with:
        fetch-depth: 1
    - name: Test composite action
      uses: ./
      with:
        source: .
    timeout-minutes: 10
