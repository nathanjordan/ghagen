# This file is generated by ghagen. Do not edit manually.
name: CI
on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Set up uv
      uses: astral-sh/setup-uv@v4
    - name: Sync
      run: uv sync
    - name: Ruff check
      run: uv run ruff check src/ tests/
    - name: actionlint
      uses: rhysd/actionlint@v1.7.11
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Set up uv
      uses: astral-sh/setup-uv@v4
    - name: Sync
      run: uv sync
    - name: Pyright
      run: uv run pyright src/
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
        - '3.11'
        - '3.12'
        - '3.13'
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Set up uv
      uses: astral-sh/setup-uv@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Sync
      run: uv sync
    - name: Test
      run: uv run pytest
  check-sync:
    name: Check workflow sync
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Set up uv
      uses: astral-sh/setup-uv@v4
    - name: Sync
      run: uv sync
    - name: Verify workflows
      run: uv run ghagen check
