# This file is generated by ghagen. Do not edit manually.
name: Docs
on:
  push:
    branches:
    - main
  workflow_dispatch:
permissions:
  contents: write
jobs:
  deploy:
    name: Deploy docs
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Set up uv
      uses: astral-sh/setup-uv@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: uv sync
    - name: Configure Git
      run: |-
        git config user.name github-actions[bot]
        git config user.email 41898282+github-actions[bot]@users.noreply.github.com
    - name: Deploy docs
      run: uv run mkdocs gh-deploy --force
    timeout-minutes: 15
