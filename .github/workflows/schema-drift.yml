# This file is generated by ghagen. Do not edit manually.
name: Schema Drift Check
on:
  schedule:
  - cron: 0 9 * * 1
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Set up uv
      uses: astral-sh/setup-uv@v4
    - name: Sync
      run: uv sync
    - name: Fetch schema and regenerate
      run: "uv run python -m ghagen.schema.fetch\nuv run python -m ghagen.schema.codegen"
    - name: Check for drift
      run: "if ! git diff --exit-code src/ghagen/schema/snapshot/; then\n  echo \"::warning::Schema drift detected\"\n  gh issue create \\\n    --title \"GitHub Actions schema drift detected\" \\\n    --body \"$(git diff src/ghagen/schema/snapshot/)\" \\\n    --label schema-drift\nfi"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
