# This file is generated by ghagen from .github/ghagen_workflows.py.
# Do not edit manually.
name: Release
on:
  push:
    branches:
    - main
jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - id: release
      name: Release Please
      uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071  # v4
    - name: Checkout
      if: steps.release.outputs.release_created == 'true'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
    - name: Update major version tag
      if: steps.release.outputs.release_created == 'true'
      run: |-
        TAG="${{ steps.release.outputs.tag_name }}"
        MAJOR="${TAG%%.*}"
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git tag -fa "$MAJOR" -m "Update $MAJOR tag to $TAG"
        git push origin "$MAJOR" --force
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      ts_release_created: ${{ steps.release.outputs['packages/typescript--release_created'] }}
      ts_tag_name: ${{ steps.release.outputs['packages/typescript--tag_name'] }}
    timeout-minutes: 10
  approve-release:
    name: Approve Release
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || needs.release-please.outputs.ts_release_created == 'true'
    environment:
      name: release-gate
    steps:
    - name: Approve
      run: echo "Release approved"
    timeout-minutes: 5
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
    - release-please
    - approve-release
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
      id-token: write
    environment:
      name: release
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
    - name: Set up uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
    - name: Build
      run: uv build
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
    timeout-minutes: 10
  npm-publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs:
    - release-please
    - approve-release
    if: needs.release-please.outputs.ts_release_created == 'true'
    permissions:
      contents: read
      id-token: write
    environment:
      name: release-npm
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
      with:
        node-version: '24'
        registry-url: https://registry.npmjs.org
    - name: Install dependencies
      run: npm install
      working-directory: packages/typescript
    - name: Build
      run: npm run build
      working-directory: packages/typescript
    - name: Publish to npm
      run: npm publish --provenance
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      working-directory: packages/typescript
    timeout-minutes: 10
  homebrew-bump:
    name: Bump Homebrew tap
    runs-on: ubuntu-latest
    needs:
    - release-please
    - approve-release
    - publish
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
    environment:
      name: release-homebrew
    steps:
    - name: Check out nathanjordan/homebrew-tap
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      with:
        repository: nathanjordan/homebrew-tap
        token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        path: homebrew-tap
    - name: Bump ghagen formula
      run: |-
        # Strip tag prefix: v0.2.1 -> 0.2.1
        VERSION="${TAG#v}"
        export VERSION

        # Fetch sdist URL + sha256 from PyPI and rewrite Formula/ghagen.rb.
        # re.M + `^  ` (2-space indent) targets top-level url/sha256 only,
        # never the 4-space-indented fields inside `resource` blocks.
        python3 - <<'PY'
        import json, os, pathlib, re, urllib.request
        version = os.environ["VERSION"]
        meta = json.loads(
            urllib.request.urlopen(
                f"https://pypi.org/pypi/ghagen/{version}/json"
            ).read()
        )
        sdist = next(f for f in meta["urls"] if f["packagetype"] == "sdist")
        formula = pathlib.Path("Formula/ghagen.rb")
        text = formula.read_text()
        text = re.sub(
            r'^  url "[^"]*"',
            f'  url "{sdist["url"]}"',
            text,
            count=1,
            flags=re.M,
        )
        text = re.sub(
            r'^  sha256 "[^"]*"',
            f'  sha256 "{sdist["digests"]["sha256"]}"',
            text,
            count=1,
            flags=re.M,
        )
        formula.write_text(text)
        PY

        # Stop if the formula didn't actually change (e.g. re-run of same release).
        if git diff --quiet Formula/ghagen.rb; then
          echo "Formula/ghagen.rb already matches ${VERSION}, nothing to do."
          exit 0
        fi

        # Commit and push directly to main.
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add Formula/ghagen.rb
        git commit -m "ghagen ${VERSION}"
        git push origin main
      env:
        TAG: ${{ needs.release-please.outputs.tag_name }}
      working-directory: homebrew-tap
    timeout-minutes: 10
