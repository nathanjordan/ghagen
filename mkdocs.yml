site_name: ghagen
site_description: Generate GitHub Actions workflows from Python
site_url: https://nathanjordan.github.io/ghagen/
repo_url: https://github.com/nathanjordan/ghagen
repo_name: nathanjordan/ghagen
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 3
            members_order: source
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            merge_init_into_class: true
            show_if_no_docstring: false
            separate_signature: true
            signature_crossrefs: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts: concepts.md
  - Guides:
      - DRY Patterns: dry-patterns.md
      - Escape Hatches: escape-hatches.md
      - Comments: comments.md
      - Linting: linting.md
  - CLI Reference: cli.md
  - API Reference:
      - Workflow: api/workflow.md
      - Job: api/job.md
      - Step: api/step.md
      - Triggers: api/triggers.md
      - Permissions: api/permissions.md
      - Helpers: api/helpers.md
