# This file is generated by ghagen. Do not edit manually.
name: ghagen Check
description: Verify GitHub Actions workflows are in sync with Python definitions
branding:
  icon: check-circle
  color: green
inputs:
  config:
    description: Path to ghagen config file
    required: false
    default: .github/ghagen_workflows.py
  python-version:
    description: Python version to use
    required: false
    default: '3.13'
  ghagen-version:
    description: ghagen version to install (empty for latest)
    required: false
    default: ''
  source:
    description: Local source path to install from (for testing). Leave empty to install from PyPI.
    required: false
    default: ''
runs:
  using: composite
  steps:
  - uses: actions/setup-python@v5
    with:
      python-version: ${{ inputs.python-version }}
  - name: Install ghagen
    run: "if [ -n \"${{ inputs.source }}\" ]; then\n  pip install \"${{ inputs.source }}\"\nelse\n  pip install ghagen${{ inputs.ghagen-version != '' && format('=={0}', inputs.ghagen-version) || '' }}\nfi"
    shell: bash
  - name: Check workflows
    run: ghagen check --config "${{ inputs.config }}"
    shell: bash
